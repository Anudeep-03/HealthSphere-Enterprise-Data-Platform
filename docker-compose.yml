services:
  # ===========================================================================
  # POSTGRESQL: Primary Relational Database
  # Used for metadata, application state, and structured healthcare records.
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: healthsphere-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - healthsphere-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # REDIS: Distributed Cache and Message Broker
  # Used for session management, API caching, and temporary state.
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: healthsphere-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - healthsphere-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # KAFKA: Event Streaming Platform (KRaft Mode)
  # Handles real-time data ingestion and asynchronous communication.
  # KRaft removes the dependency on ZooKeeper for a simplified architecture.
  # ===========================================================================
  kafka:
    image: apache/kafka:latest
    container_name: healthsphere-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - healthsphere-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-storage.sh print-storage-snapshot"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================================================
  # MINIO: S3-Compatible Object Storage
  # Acts as the Data Lake (Bronze/Silver/Gold layers) for storing raw files.
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: healthsphere-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - healthsphere-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  healthsphere-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  minio-data:
